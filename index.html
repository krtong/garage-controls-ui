  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://tbrnarytcojngpbzzwcn.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRicm5hcnl0Y29qbmdwYnp6d2NuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjY4MDMyOTEsImV4cCI6MjA4MjM3OTI5MX0.oMkzwOLvb6K-HzFk4syQGsM5YULed_5VHc0LxhGgEpg";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const CRON_MS = 60 * 1000;
    const HOLD_MS = 1000;
    const CIRCUMFERENCE = 2 * Math.PI * 58;

    // State
    let systemEnabled = true;
    let settings = { closeDelay: 10, checkDelay: 1, retryDelay: 5 };
    let doors = [];
    let events = [];
    let activeTab = 'state';
    let showSettings = false;

    // DOM refs
    const stateView = document.getElementById('stateView');
    const eventsView = document.getElementById('eventsView');
    const eventsList = document.getElementById('eventsList');
    const settingsPanel = document.getElementById('settingsPanel');
    const template = document.getElementById('doorCardTemplate');

    // Helpers
    function clamp(n, min, max) { return Math.min(max, Math.max(min, n)); }
    function ceilToCron(ts) { return Math.ceil(ts / CRON_MS) * CRON_MS; }

    function formatCountdown(sec) {
      const s = Math.max(0, Math.floor(sec));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return `${m}:${String(r).padStart(2, '0')}`;
    }

    function formatDuration(ms) {
      if (!ms || ms < 0) return '—';
      const hours = ms / (1000 * 60 * 60);
      if (hours < 1) return `${Math.floor(ms / (1000 * 60))}m`;
      if (hours < 24) return `${Math.floor(hours)}h ${Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60))}m`;
      const days = Math.floor(hours / 24);
      const remainingHours = Math.floor(hours % 24);
      return `${days}d ${remainingHours}h`;
    }

    function formatTime(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString('en-US', {
        month: 'short', day: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // Compute countdown for open door
    function computeCountdown(door, now) {
      if (!door.is_open || !door.last_open) {
        return { phase: 'closed', remaining: 0, total: 1, progress: 1, dueAt: null };
      }

      const openedAt = new Date(door.last_open).getTime();
      const hasRetried = door.last_close_attempt_at && new Date(door.last_close_attempt_at).getTime() > openedAt;
      const phase = hasRetried ? 'retry' : 'initial';
      const baseAt = phase === 'initial' ? openedAt : new Date(door.last_close_attempt_at).getTime();
      const delayMin = phase === 'initial' ? settings.closeDelay : settings.retryDelay;

      const rawTarget = baseAt + delayMin * 60 * 1000;
      const dueAt = ceilToCron(rawTarget);

      const total = Math.max(1, (dueAt - baseAt) / 1000);
      const remaining = clamp((dueAt - now) / 1000, 0, total);
      const progress = remaining / total;

      return { phase, remaining, total, progress, dueAt };
    }

    // Create door card
    function createDoorCard(door) {
      const clone = template.content.cloneNode(true);
      const card = clone.querySelector('.door-card');
      card.dataset.door = door.door;
      card.querySelector('.door-name').textContent = door.door;
      return card;
    }

    // Update door card
    function updateDoorCard(card, door, now) {
      const isOpen = door.is_open;
      // Check if there's an active close scheduled
      const hasScheduledClose = door.next_close_at && new Date(door.next_close_at).getTime() > now;
      const isClosing = isOpen && hasScheduledClose && door.next_action === 'close';

      // Ring
      const ringProgress = card.querySelector('.ring-progress');
      const ringCenter = card.querySelector('.ring-center');
      const ringContainer = card.querySelector('.ring-container');

      let countdown;
      let ringColor = '#10b981'; // emerald (closed)
      let autoClosing = false;

      if (isClosing) {
        // In closing pipeline - showing time until scheduled close
        const closeAt = new Date(door.next_close_at).getTime();
        const remaining = clamp((closeAt - now) / 1000, 0, settings.checkDelay * 60);
        countdown = { phase: 'closing', remaining, total: settings.checkDelay * 60, progress: remaining / (settings.checkDelay * 60) };
        autoClosing = true;
        ringColor = '#ef4444';
      } else if (isOpen) {
        countdown = computeCountdown(door, now);
        ringColor = countdown.phase === 'retry' ? '#f59e0b' : '#3b82f6';
      } else {
        countdown = { phase: 'closed', remaining: 0, total: 1, progress: 1 };
      }

      const dashOffset = CIRCUMFERENCE - countdown.progress * CIRCUMFERENCE;
      ringProgress.style.stroke = ringColor;
      ringProgress.style.strokeDashoffset = dashOffset;

      if (autoClosing) {
        ringContainer.classList.add('animate-pulse-glow');
        ringProgress.style.filter = 'drop-shadow(0 0 14px rgba(239, 68, 68, 0.55))';
      } else if (isOpen) {
        ringContainer.classList.remove('animate-pulse-glow');
        ringProgress.style.filter = 'drop-shadow(0 0 10px rgba(59, 130, 246, 0.55))';
      } else {
        ringContainer.classList.remove('animate-pulse-glow');
        ringProgress.style.filter = 'drop-shadow(0 0 8px rgba(16, 185, 129, 0.45))';
      }

      // Ring center content
      if (isOpen) {
        const timeClass = autoClosing ? 'text-red-300' : 'text-blue-300';
        let label = 'until close';
        if (isClosing) {
          label = 'closing...';
        } else if (countdown.phase === 'retry') {
          label = 'until retry';
        }

        const hasRetried = door.last_close_attempt_at && door.last_open &&
          new Date(door.last_close_attempt_at).getTime() > new Date(door.last_open).getTime();

        ringCenter.innerHTML = `
          <span class="font-mono text-3xl font-light ${timeClass}">${formatCountdown(countdown.remaining)}</span>
          <span class="mt-1 text-[10px] uppercase tracking-widest text-zinc-500">${label}</span>
          ${hasRetried ? `<span class="mt-1 text-[10px] text-amber-400">Retry</span>` : ''}
        `;
      } else {
        ringCenter.innerHTML = `
          <div class="mb-1 flex h-8 w-8 items-center justify-center rounded-full bg-emerald-500/15">
            <svg class="h-5 w-5 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="text-sm uppercase tracking-widest text-emerald-400">Closed</span>
        `;
      }

      // Event info - derive type from is_open state
      const eventDot = card.querySelector('.event-dot');
      const eventType = card.querySelector('.event-type');
      const eventTime = card.querySelector('.event-time');

      const latestType = isOpen ? 'OPENED' : 'CLOSED';
      eventType.textContent = latestType;
      eventTime.textContent = formatTime(door.last_event_at);

      if (latestType.includes('FAIL') || latestType.includes('ERROR')) {
        eventDot.className = 'event-dot h-2 w-2 rounded-full bg-amber-400';
      } else if (latestType.includes('CLOSED')) {
        eventDot.className = 'event-dot h-2 w-2 rounded-full bg-emerald-400';
      } else {
        eventDot.className = 'event-dot h-2 w-2 rounded-full bg-blue-400';
      }

      // Duration
      const durationLabel = card.querySelector('.duration-label');
      const durationValue = card.querySelector('.duration-value');
      durationLabel.textContent = isOpen ? 'Open For' : 'Closed For';

      if (isOpen && door.last_open) {
        durationValue.textContent = formatCountdown((now - new Date(door.last_open).getTime()) / 1000);
      } else if (!isOpen && door.last_close) {
        durationValue.textContent = formatDuration(now - new Date(door.last_close).getTime());
      } else {
        durationValue.textContent = '—';
      }

      // Next action
      const nextAction = card.querySelector('.next-action');
      const nextIn = card.querySelector('.next-in');

      if (isClosing) {
        nextAction.textContent = 'Closing...';
        nextIn.textContent = `~${formatCountdown(countdown.remaining)}`;
      } else if (isOpen) {
        nextAction.textContent = countdown.phase === 'retry' ? 'Retry close' : 'Close attempt';
        nextIn.textContent = `~${formatCountdown(countdown.remaining)}`;
      } else {
        nextAction.textContent = '—';
        nextIn.textContent = '—';
      }

      // Action button
      const actionContainer = card.querySelector('.action-container');

      if (isOpen) {
        if (isClosing) {
          const btnClass = autoClosing
            ? 'border-red-500/50 bg-red-500/10 text-red-200 animate-pulse'
            : 'border-emerald-500/35 bg-emerald-500/10 text-emerald-200';
          actionContainer.innerHTML = `
            <button disabled class="w-full rounded-xl border px-4 py-3 text-xs uppercase tracking-widest transition-all ${btnClass}">
              Closing...
            </button>
          `;
        } else {
          actionContainer.innerHTML = `
            <button class="close-btn w-full select-none rounded-xl py-3 text-xs uppercase tracking-widest transition-all hover:brightness-110"
                    style="border: 1px solid transparent; background: linear-gradient(rgba(16,185,129,0.14), rgba(16,185,129,0.14)) padding-box, linear-gradient(rgba(63,63,70,0.7), rgba(63,63,70,0.7)) border-box; color: rgba(167,243,208,1); touch-action: none;"
                    data-door="${door.door}">
              <div class="flex flex-col items-center">
                <div>Close Now</div>
                <div class="mt-1 text-[10px] tracking-[0.22em] text-zinc-400">hold 1s</div>
              </div>
            </button>
          `;
          setupHoldButton(actionContainer.querySelector('.close-btn'));
        }
      } else {
        actionContainer.innerHTML = `
          <button class="open-btn w-full rounded-xl border border-zinc-700/70 py-3 text-xs uppercase tracking-widest text-zinc-300 transition-all hover:bg-zinc-700/30 hover:text-zinc-100"
                  data-door="${door.door}">
            Open Door
          </button>
        `;
        actionContainer.querySelector('.open-btn').addEventListener('click', () => triggerDoor(door.door, 'open'));
      }
    }

    // Hold-to-activate button
    function setupHoldButton(btn) {
      let holding = false;
      let startTime = 0;
      let rafId = 0;

      const stop = () => {
        holding = false;
        cancelAnimationFrame(rafId);
        btn.style.background = 'linear-gradient(rgba(16,185,129,0.14), rgba(16,185,129,0.14)) padding-box, linear-gradient(rgba(63,63,70,0.7), rgba(63,63,70,0.7)) border-box';
      };

      const step = () => {
        const elapsed = performance.now() - startTime;
        const progress = clamp(elapsed / HOLD_MS, 0, 1);
        const deg = Math.round(progress * 360);

        btn.style.background = `linear-gradient(rgba(16,185,129,0.14), rgba(16,185,129,0.14)) padding-box, conic-gradient(rgba(52,211,153,0.95) ${deg}deg, rgba(63,63,70,0.55) 0deg) border-box`;

        if (progress >= 1) {
          stop();
          triggerDoor(btn.dataset.door, 'close');
          return;
        }

        rafId = requestAnimationFrame(step);
      };

      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        holding = true;
        startTime = performance.now();
        rafId = requestAnimationFrame(step);
      });

      btn.addEventListener('pointerup', stop);
      btn.addEventListener('pointercancel', stop);
      btn.addEventListener('pointerleave', stop);
      btn.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    // Trigger door action via IFTTT webhook (through edge function)
    async function triggerDoor(door, action) {
      // Update local state immediately for responsiveness
      const doorIdx = doors.findIndex(d => d.door === door);
      if (doorIdx >= 0 && action === 'close') {
        doors[doorIdx].next_action = 'close';
        doors[doorIdx].next_close_at = new Date(ceilToCron(Date.now())).toISOString();
        render();
      }

      try {
        // Call the garage-event function to record the action
        const resp = await fetch(`${SUPABASE_URL}/functions/v1/garage-event`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          },
          body: JSON.stringify({
            door: door,
            event_type: action === 'close' ? 'CLOSE_REQUESTED' : 'OPEN_REQUESTED',
            source: 'ui'
          })
        });

        if (!resp.ok) {
          const errorText = await resp.text();
          console.error('Failed to trigger door:', errorText);
          alert(`Failed to ${action} ${door} door: ${errorText}`);
          // Revert local state on error
          if (doorIdx >= 0 && action === 'close') {
            doors[doorIdx].next_action = null;
            doors[doorIdx].next_close_at = null;
            render();
          }
        }
      } catch (err) {
        console.error('Error triggering door:', err);
        alert(`Error triggering ${door} door: ${err.message}`);
        // Revert local state on error
        if (doorIdx >= 0 && action === 'close') {
          doors[doorIdx].next_action = null;
          doors[doorIdx].next_close_at = null;
          render();
        }
      }
    }

    // Render UI
    function render() {
      const now = Date.now();

      // Update door cards
      doors.forEach(door => {
        let card = stateView.querySelector(`[data-door="${door.door}"]`);
        if (!card) {
          card = createDoorCard(door);
          stateView.appendChild(card);
        }
        updateDoorCard(card, door, now);
      });

      // Update events list
      eventsList.innerHTML = events.map(e => {
        const type = (e.event_type || '').toUpperCase();
        let dotClass = 'bg-blue-400';
        if (type.includes('FAIL') || type.includes('ERROR')) dotClass = 'bg-amber-400';
        else if (type.includes('CLOSED')) dotClass = 'bg-emerald-400';
        else if (type.includes('SIGNAL') || type.includes('CLOSE')) dotClass = 'bg-red-400';

        return `
          <li class="flex items-center justify-between gap-4 px-5 py-4">
            <div class="flex items-center gap-3">
              <span class="h-2.5 w-2.5 rounded-full ${dotClass}"></span>
              <div>
                <div class="text-sm text-zinc-200">
                  <span class="text-zinc-100">${e.event_type}</span>
                  <span class="text-zinc-500"> • </span>
                  <span class="text-zinc-300">${e.door}</span>
                </div>
                <div class="text-xs text-zinc-500">${formatTime(e.created_at)}</div>
              </div>
            </div>
            <div class="text-[10px] font-mono text-zinc-600">${String(e.id).slice(0, 8)}</div>
          </li>
        `;
      }).join('');

      // Update status
      document.getElementById('statusText').textContent = `Live data • ${systemEnabled ? 'System enabled' : 'System paused'}`;
    }

    // Fetch data from Supabase
    async function fetchData() {
      // Fetch door state
      const { data: stateData, error: stateError } = await supabase
        .from('garage_state')
        .select('*')
        .order('door');

      if (stateError) {
        console.error('Failed to load door state:', stateError);
        alert(`Failed to load door state: ${stateError.message}`);
      } else {
        doors = stateData || [];
      }

      // Fetch recent events
      const { data: eventData, error: eventError } = await supabase
        .from('garage_events')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      if (eventError) {
        console.error('Failed to load events:', eventError);
        alert(`Failed to load events: ${eventError.message}`);
      } else {
        events = eventData || [];
      }

      // Fetch settings
      const { data: settingsData, error: settingsError } = await supabase
        .from('garage_settings')
        .select('*')
        .single();

      if (settingsError) {
        console.error('Failed to load settings:', settingsError);
        alert(`Failed to load settings: ${settingsError.message}`);
      } else if (settingsData) {
        settings.closeDelay = settingsData.close_delay_min || 10;
        settings.checkDelay = settingsData.check_delay_min || 1;
        settings.retryDelay = settingsData.retry_delay_min || 5;
        updateSettingsUI();
      }

      render();
    }

    // Format check delay as Xm Ys
    function formatCheckDelay(minutes) {
      const totalSec = Math.round(minutes * 60);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      if (m === 0) return `${s}s`;
      if (s === 0) return `${m}m`;
      return `${m}m ${s}s`;
    }

    // Update settings UI
    function updateSettingsUI() {
      document.getElementById('closeDelayValue').textContent = settings.closeDelay;
      document.getElementById('closeDelayBar').style.width = `${((settings.closeDelay - 5) / 55) * 100}%`;
      document.getElementById('closeDelaySlider').value = settings.closeDelay;

      document.getElementById('checkDelayValue').textContent = formatCheckDelay(settings.checkDelay);
      document.getElementById('checkDelayBar').style.width = `${((settings.checkDelay - 0.5) / 3.5) * 100}%`;
      document.getElementById('checkDelaySlider').value = settings.checkDelay;

      document.getElementById('retryDelayValue').textContent = settings.retryDelay;
      document.getElementById('retryDelayBar').style.width = `${((settings.retryDelay - 3) / 7) * 100}%`;
      document.getElementById('retryDelaySlider').value = settings.retryDelay;
    }

    // Save settings
    async function saveSettings() {
      const { error } = await supabase
        .from('garage_settings')
        .update({
          close_delay_min: settings.closeDelay,
          check_delay_min: settings.checkDelay,
          retry_delay_min: settings.retryDelay,
          updated_at: new Date().toISOString()
        })
        .eq('id', 'global');

      if (error) {
        console.error('Failed to save settings:', error);
        alert(`Failed to save settings: ${error.message}`);
        return;
      }

      settingsPanel.classList.add('hidden');
      showSettings = false;
    }

    // Event listeners
    document.getElementById('settingsBtn').addEventListener('click', () => {
      showSettings = !showSettings;
      settingsPanel.classList.toggle('hidden', !showSettings);
    });

    document.getElementById('saveSettingsBtn').addEventListener('click', saveSettings);

    document.getElementById('closeDelaySlider').addEventListener('input', (e) => {
      settings.closeDelay = parseInt(e.target.value);
      document.getElementById('closeDelayValue').textContent = settings.closeDelay;
      document.getElementById('closeDelayBar').style.width = `${((settings.closeDelay - 5) / 55) * 100}%`;
    });

    document.getElementById('checkDelaySlider').addEventListener('input', (e) => {
      settings.checkDelay = parseFloat(e.target.value);
      document.getElementById('checkDelayValue').textContent = formatCheckDelay(settings.checkDelay);
      document.getElementById('checkDelayBar').style.width = `${((settings.checkDelay - 0.5) / 3.5) * 100}%`;
    });

    document.getElementById('retryDelaySlider').addEventListener('input', (e) => {
      settings.retryDelay = parseInt(e.target.value);
      document.getElementById('retryDelayValue').textContent = settings.retryDelay;
      document.getElementById('retryDelayBar').style.width = `${((settings.retryDelay - 3) / 7) * 100}%`;
    });

    document.getElementById('tabState').addEventListener('click', () => {
      activeTab = 'state';
      document.getElementById('tabState').className = 'flex items-center gap-2 rounded-lg px-4 py-2 transition-colors bg-zinc-800/50 text-zinc-100';
      document.getElementById('tabEvents').className = 'flex items-center gap-2 rounded-lg px-4 py-2 transition-colors text-zinc-500 hover:text-zinc-300';
      stateView.classList.remove('hidden');
      eventsView.classList.add('hidden');
    });

    document.getElementById('tabEvents').addEventListener('click', () => {
      activeTab = 'events';
      document.getElementById('tabEvents').className = 'flex items-center gap-2 rounded-lg px-4 py-2 transition-colors bg-zinc-800/50 text-zinc-100';
      document.getElementById('tabState').className = 'flex items-center gap-2 rounded-lg px-4 py-2 transition-colors text-zinc-500 hover:text-zinc-300';
      eventsView.classList.remove('hidden');
      stateView.classList.add('hidden');
    });

    document.getElementById('refreshBtn').addEventListener('click', fetchData);

    document.getElementById('systemToggle').addEventListener('click', () => {
      systemEnabled = !systemEnabled;
      const track = document.getElementById('systemToggleTrack');
      const thumb = document.getElementById('systemToggleThumb');
      if (systemEnabled) {
        track.className = 'relative h-6 w-12 rounded-full transition-colors bg-emerald-500/30';
        thumb.className = 'absolute top-1 h-4 w-4 rounded-full transition-all left-7 bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)]';
      } else {
        track.className = 'relative h-6 w-12 rounded-full transition-colors bg-zinc-700';
        thumb.className = 'absolute top-1 h-4 w-4 rounded-full transition-all left-1 bg-zinc-500';
      }
      render();
    });

    // Real-time subscriptions
    function setupRealtimeSubscriptions() {
      supabase
        .channel('garage_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'garage_state' }, () => fetchData())
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'garage_events' }, () => fetchData())
        .subscribe();
    }

    // Authentication
    const loginPage = document.getElementById('loginPage');
    const appContainer = document.getElementById('appContainer');
    const loginBtn = document.getElementById('loginBtn');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const signOutBtn = document.getElementById('signOutBtn');

    function showLogin() {
      loginPage.classList.remove('hidden');
      appContainer.classList.add('hidden');
    }

    function showApp() {
      loginPage.classList.add('hidden');
      appContainer.classList.remove('hidden');
    }

    function showLoginError(message) {
      loginError.textContent = message;
      loginError.classList.remove('hidden');
    }

    function hideLoginError() {
      loginError.classList.add('hidden');
    }

    async function handleLogin() {
      const email = loginEmail.value.trim();
      const password = loginPassword.value;

      if (!email || !password) {
        showLoginError('Please enter email and password');
        return;
      }

      hideLoginError();
      loginBtn.textContent = 'Signing in...';
      loginBtn.disabled = true;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      loginBtn.textContent = 'Sign In';
      loginBtn.disabled = false;

      if (error) {
        showLoginError(error.message);
        return;
      }

      showApp();
      fetchData();
      setupRealtimeSubscriptions();
      startPolling();
    }

    async function handleSignOut() {
      await supabase.auth.signOut();
      showLogin();
      stopPolling();
      // Clear data
      doors = [];
      events = [];
      stateView.innerHTML = '';
      eventsList.innerHTML = '';
    }

    // Login event listeners
    loginBtn.addEventListener('click', handleLogin);
    loginPassword.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleLogin();
    });
    loginEmail.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginPassword.focus();
    });
    signOutBtn.addEventListener('click', handleSignOut);

    // Polling for state changes every 10 seconds
    let pollingInterval = null;

    function startPolling() {
      if (pollingInterval) return;
      pollingInterval = setInterval(fetchData, 10000);
    }

    function stopPolling() {
      if (pollingInterval) {
        clearInterval(pollingInterval);
        pollingInterval = null;
      }
    }

    // Clock tick for countdown updates
    setInterval(render, 250);

    // Check for existing session on load
    async function init() {
      const { data: { session } } = await supabase.auth.getSession();

      if (session) {
        showApp();
        fetchData();
        setupRealtimeSubscriptions();
        startPolling();
      } else {
        showLogin();
      }
    }

    init();
  </script>
</body>
</html>
