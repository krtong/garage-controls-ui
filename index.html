<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <title>Automation Control Panel</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0f1f;
        --panel: #141b2f;
        --panel-2: #111725;
        --border: #2a3352;
        --text: #e8ecf7;
        --muted: #9aa3bd;
        --accent: #38bdf8;
        --accent-2: #22d3ee;
        --danger: #f87171;
        --success: #34d399;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 24px;
        background: radial-gradient(circle at 20% 20%, #1a2547 0%, #0a0f1f 45%, #070b16 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .wrap {
        max-width: 780px;
        margin: 0 auto;
        background: linear-gradient(160deg, rgba(20,27,47,0.95), rgba(12,16,32,0.98));
        border-radius: 20px;
        padding: 20px;
        border: 1px solid rgba(42, 51, 82, 0.7);
        box-shadow: 0 24px 60px rgba(5, 8, 20, 0.6);
      }
      h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.2px; }
      h2 { margin: 18px 0 8px; font-size: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; }
      .row { margin: 14px 0; }
      label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 14px; color: var(--muted); }
      input[type="email"], input[type="password"], input[type="number"], input[type="text"], select {
        width: 100%;
        padding: 14px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--panel-2);
        color: var(--text);
        font-size: 16px;
      }
      input:focus, select:focus {
        outline: 2px solid rgba(56, 189, 248, 0.6);
        border-color: transparent;
      }
      button {
        padding: 14px 18px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        background: linear-gradient(135deg, #0ea5e9, #22d3ee);
        color: #02131f;
        font-weight: 700;
        font-size: 16px;
        min-height: 48px;
      }
      button.secondary {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      button.danger {
        background: transparent;
        border: 1px solid rgba(248, 113, 113, 0.6);
        color: var(--danger);
      }
      .hidden { display: none; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; }
      .status {
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 12px;
        background: rgba(17, 23, 37, 0.7);
        border: 1px solid rgba(42, 51, 82, 0.7);
        font-size: 14px;
        color: var(--muted);
      }
      .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
      .topbar { display: flex; flex-direction: column; gap: 10px; }
      .switch {
        position: relative;
        width: 56px;
        height: 32px;
        display: inline-block;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #2b334f;
        border-radius: 999px;
        transition: .2s ease;
        border: 1px solid var(--border);
      }
      .slider:before {
        position: absolute;
        content: "";
        height: 24px;
        width: 24px;
        left: 4px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: .2s ease;
      }
      input:checked + .slider { background: rgba(52, 211, 153, 0.6); border-color: rgba(52, 211, 153, 0.7); }
      input:checked + .slider:before { transform: translateX(24px); }
      .grid { display: grid; gap: 12px; }
      .card {
        border: 1px solid rgba(42, 51, 82, 0.6);
        border-radius: 16px;
        padding: 14px;
        background: rgba(10, 15, 31, 0.6);
      }
      .row-inline { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .process-tabs {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
      }
      .process-tab {
        flex: 0 0 auto;
        padding: 12px 16px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: rgba(10, 15, 31, 0.4);
        color: var(--text);
        font-weight: 600;
        font-size: 14px;
      }
      .process-tab.active {
        background: linear-gradient(135deg, rgba(14, 165, 233, 0.7), rgba(34, 211, 238, 0.7));
        color: #03121f;
        border-color: transparent;
      }
      @media (max-width: 640px) {
        body { padding: 16px; }
        .wrap { padding: 16px; }
        h1 { font-size: 20px; }
        button { width: 100%; }
        .actions { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div id="status" class="status">Checking session…</div>
      </div>

      <section id="auth" class="card">
        <h2>Sign in</h2>
        <div class="row">
          <label>Email</label>
          <input id="email" type="email" placeholder="you@example.com" autocomplete="username"/>
        </div>
        <div class="row">
          <label>Password</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <div class="actions">
          <button id="login">Sign in</button>
        </div>
      </section>

      <section id="settings" class="hidden">
        <div class="card grid">
          <div class="row">
            <label>Process</label>
            <div id="process-tabs" class="process-tabs"></div>
          </div>
        </div>

        <div class="card grid">
          <div class="row-inline">
            <div>
              <div style="font-weight:600;">System enabled</div>
              <div class="meta">Toggle to pause all automation.</div>
            </div>
            <label class="switch">
              <input id="enabled" type="checkbox"/>
              <span class="slider"></span>
            </label>
          </div>
          <div class="row">
            <label>Close delay (minutes)</label>
            <input id="close_delay_min" type="number" min="1" value="10" inputmode="numeric"/>
          </div>
          <div class="row">
            <label>Check delay (minutes)</label>
            <input id="check_delay_min" type="number" min="1" value="1" inputmode="numeric"/>
          </div>
          <div class="row">
            <label>Retry delay (minutes)</label>
            <input id="retry_delay_min" type="number" min="1" value="4" inputmode="numeric"/>
          </div>
        </div>

        <div class="actions">
          <button id="save">Save settings</button>
          <button id="logout" class="secondary">Sign out</button>
        </div>
      </section>
    </div>

    <script type="module">
      import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

      const SUPABASE_URL = "https://tbrnarytcojngpbzzwcn.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_E8-dvNNh5V3VQLAcK-xqiQ_dLEu1Bsh";
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const statusEl = document.getElementById("status");
      const authEl = document.getElementById("auth");
      const settingsEl = document.getElementById("settings");

      const emailEl = document.getElementById("email");
      const passwordEl = document.getElementById("password");
      const processTabsEl = document.getElementById("process-tabs");
      const enabledEl = document.getElementById("enabled");
      const closeDelayEl = document.getElementById("close_delay_min");
      const checkDelayEl = document.getElementById("check_delay_min");
      const retryDelayEl = document.getElementById("retry_delay_min");
      let currentProcessId = "global";

      async function loadSettings() {
        const { data, error } = await supabase
          .from("garage_settings")
          .select("*")
          .eq("id", currentProcessId)
          .single();
        if (error) {
          statusEl.textContent = "Failed to load settings: " + error.message;
          return;
        }
        enabledEl.checked = data.enabled ?? true;
        closeDelayEl.value = data.close_delay_min ?? 10;
        checkDelayEl.value = data.check_delay_min ?? 1;
        retryDelayEl.value = data.retry_delay_min ?? 4;
      }

      function renderProcessTabs(processes) {
        processTabsEl.innerHTML = "";
        processes.forEach((process) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "process-tab";
          button.textContent = process.label ?? process.id;
          button.dataset.processId = process.id;
          if (process.id === currentProcessId) {
            button.classList.add("active");
          }
          button.addEventListener("click", async () => {
            currentProcessId = process.id;
            renderProcessTabs(processes);
            await loadSettings();
          });
          processTabsEl.appendChild(button);
        });
        if (processes.length && !processes.find((p) => p.id === currentProcessId)) {
          currentProcessId = processes[0].id;
          renderProcessTabs(processes);
        }
      }

      async function loadProcesses() {
        const { data, error } = await supabase
          .from("garage_settings")
          .select("*")
          .order("label", { ascending: true });
        if (error) {
          statusEl.textContent = "Failed to load processes: " + error.message;
          return;
        }
        const processes = data ?? [];
        renderProcessTabs(processes);
        if (processes.length) {
          await loadSettings();
        }
      }

      async function refreshSession() {
        const { data } = await supabase.auth.getSession();
        const session = data?.session;
        if (session) {
          authEl.classList.add("hidden");
          settingsEl.classList.remove("hidden");
          statusEl.textContent = "";
          await loadProcesses();
        } else {
          authEl.classList.remove("hidden");
          settingsEl.classList.add("hidden");
          statusEl.textContent = "Please sign in";
        }
      }

      document.getElementById("login").addEventListener("click", async () => {
        const email = emailEl.value.trim();
        const password = passwordEl.value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          statusEl.textContent = "Sign in failed: " + error.message;
          return;
        }
        await refreshSession();
      });

      document.getElementById("save").addEventListener("click", async () => {
        const payload = {
          id: currentProcessId,
          enabled: enabledEl.checked,
          close_delay_min: Number(closeDelayEl.value || 10),
          check_delay_min: Number(checkDelayEl.value || 1),
          retry_delay_min: Number(retryDelayEl.value || 4),
        };
        const { error } = await supabase
          .from("garage_settings")
          .upsert(payload, { onConflict: "id" });
        if (error) {
          statusEl.textContent = "Save failed: " + error.message;
          return;
        }
        statusEl.textContent = "";
      });


      document.getElementById("logout").addEventListener("click", async () => {
        await supabase.auth.signOut();
        await refreshSession();
      });

      refreshSession();
    </script>
  </body>
</html>
